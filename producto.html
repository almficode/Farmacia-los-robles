<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Producto — Farmacia Los Robles Lanzarote</title>
  <link rel="icon" type="image/png" href="Favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
  :root{--green-900:#071C11;--green-700:#174A2E;--green-600:#2C6E49;--green-100:#D4EDE1;--green-50:#EDF7F2;--gold:#C8A96E;--cream-50:#FDFCF9;--white:#FFF;--dark:#0A0A0A;--gray-600:#6B7280;--gray-200:#E5E7EB;--gray-100:#F3F4F6;--f-display:'Playfair Display',Georgia,serif;--f-sans:'Inter',system-ui,sans-serif;--max-w:1400px;--gutter:clamp(1.25rem,4vw,3rem);--nav-h:72px;--ease:cubic-bezier(.16,1,.3,1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{font-family:var(--f-sans);color:var(--dark);background:var(--cream-50)}
  body{overflow-x:hidden;padding-top:var(--nav-h)}
  a{text-decoration:none;color:inherit}
  .nav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav-h);background:rgba(7,28,17,.95);backdrop-filter:blur(20px);display:flex;align-items:center}
  .nav__inner{display:flex;align-items:center;width:100%;gap:2rem;max-width:var(--max-w);margin-inline:auto;padding-inline:var(--gutter)}
  .nav__logo{display:flex;align-items:center;gap:.75rem;font-family:var(--f-display);font-size:1.25rem;font-weight:500;color:var(--white)}
  .nav__links{display:flex;gap:2.5rem;margin-left:auto;list-style:none}
  @media(max-width:900px){.nav__links{display:none}}
  .nav__link{font-size:.8125rem;font-weight:500;color:rgba(255,255,255,.6);transition:color .25s}
  .nav__link:hover,.nav__link.active{color:var(--white)}
  .nav__right{display:flex;align-items:center;gap:.75rem;margin-left:1.5rem}
  .nav__icon-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);background:none;border:none;cursor:pointer;transition:color .25s}
  .nav__icon-btn:hover{color:var(--white)}
  .breadcrumb{padding:1.25rem var(--gutter);max-width:var(--max-w);margin-inline:auto;font-size:.8rem;color:var(--gray-600);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .breadcrumb a{color:var(--gray-600);transition:color .2s}.breadcrumb a:hover{color:var(--green-600)}
  .breadcrumb span{color:var(--gray-200)}
  .product-wrap{max-width:var(--max-w);margin-inline:auto;padding:0 var(--gutter) clamp(4rem,8vw,7rem);display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,5rem);align-items:start}
  @media(max-width:900px){.product-wrap{grid-template-columns:1fr}}
  .gallery{position:sticky;top:calc(var(--nav-h) + 1.5rem);display:flex;flex-direction:column;gap:1rem}
  @media(max-width:900px){.gallery{position:static}}
  .gallery__main{position:relative;border-radius:24px;overflow:hidden;background:var(--white);aspect-ratio:1;cursor:zoom-in;border:1px solid rgba(0,0,0,.06)}
  .gallery__main img{width:100%;height:100%;object-fit:contain;transition:transform .4s var(--ease);display:block;padding:1.5rem}
  .gallery__main:hover img{transform:scale(1.08)}
  .gallery__badge{position:absolute;top:1rem;left:1rem;padding:.3rem .75rem;border-radius:100px;font-size:.7rem;font-weight:700;letter-spacing:.08em;color:#fff}
  .gallery__badge--sale{background:#E53E3E}
  .gallery__zoom-btn{position:absolute;bottom:1rem;right:1rem;width:40px;height:40px;background:rgba(255,255,255,.9);backdrop-filter:blur(8px);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dark);transition:background .2s}
  .gallery__zoom-btn:hover{background:#fff}
  .gallery__thumbs{display:flex;gap:.75rem;flex-wrap:wrap}
  .gallery__thumb{width:72px;height:72px;border-radius:12px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--white);transition:border-color .2s;flex-shrink:0}
  .gallery__thumb.active{border-color:var(--green-600)}
  .gallery__thumb img{width:100%;height:100%;object-fit:contain;padding:.375rem}
  .pinfo{display:flex;flex-direction:column;gap:1.5rem;padding-top:.5rem}
  .pinfo__brand{font-size:.75rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--green-600)}
  .pinfo__title{font-family:var(--f-display);font-size:clamp(1.75rem,3vw,2.75rem);font-weight:700;line-height:1.1;letter-spacing:-.02em}
  .pinfo__stars{display:flex;align-items:center;gap:.5rem}
  .stars{display:flex;gap:.15rem}
  .star{color:var(--gold);font-size:.9rem}
  .star-empty{color:var(--gray-200);font-size:.9rem}
  .pinfo__reviews-count{font-size:.8125rem;color:var(--gray-600)}
  .pinfo__divider{height:1px;background:var(--gray-200)}
  .pinfo__price{display:flex;align-items:baseline;gap:.875rem;flex-wrap:wrap}
  .price-now{font-family:var(--f-display);font-size:2.25rem;font-weight:700;color:var(--dark)}
  .price-was{font-size:1.125rem;color:var(--gray-600);text-decoration:line-through}
  .price-discount{padding:.3rem .7rem;background:#FEF2F2;color:#E53E3E;border-radius:100px;font-size:.8rem;font-weight:700}
  .pinfo__stock{display:flex;align-items:center;gap:.625rem;font-size:.875rem;font-weight:500}
  .stock-dot{width:8px;height:8px;border-radius:50%}
  .stock-dot--in{background:#22C55E}
  .stock-dot--low{background:#F59E0B}
  .stock-dot--out{background:#EF4444}
  .stock-label--in{color:#16A34A}
  .stock-label--low{color:#D97706}
  .stock-label--out{color:#DC2626}
  .qty-row{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
  .qty-label{font-size:.8125rem;font-weight:600;color:var(--gray-600);text-transform:uppercase;letter-spacing:.06em}
  .qty-ctrl{display:flex;align-items:center;border:1.5px solid var(--gray-200);border-radius:100px;overflow:hidden}
  .qty-btn{width:44px;height:44px;background:none;border:none;cursor:pointer;font-size:1.125rem;color:var(--dark);transition:background .2s;display:flex;align-items:center;justify-content:center}
  .qty-btn:hover{background:var(--gray-100)}
  .qty-val{min-width:2.5rem;text-align:center;font-weight:600;font-size:.9375rem}
  .pinfo__actions{display:flex;flex-direction:column;gap:.75rem}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:.625rem;border-radius:100px;font-family:var(--f-sans);font-size:.9375rem;font-weight:600;cursor:pointer;border:none;transition:all .3s var(--ease);text-decoration:none;padding:.9rem 2rem;white-space:nowrap;width:100%}
  .btn-primary{background:var(--green-900);color:#fff}
  .btn-primary:hover{background:var(--green-700);transform:translateY(-1px);box-shadow:0 8px 32px rgba(7,28,17,.25)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-secondary{background:transparent;color:var(--dark);border:1.5px solid var(--gray-200)}
  .btn-secondary:hover{border-color:var(--dark)}
  .btn-wish{background:transparent;color:var(--gray-600);border:1.5px solid var(--gray-200);font-size:1.1rem;width:auto;padding:.9rem 1.25rem;flex-shrink:0}
  .btn-wish:hover{border-color:#E53E3E;color:#E53E3E}
  .btn-wish.active{background:#FEF2F2;border-color:#E53E3E;color:#E53E3E}
  .actions-row{display:grid;grid-template-columns:1fr auto;gap:.75rem}
  .shipping-box{background:var(--green-50);border:1px solid var(--green-100);border-radius:16px;padding:1.25rem 1.5rem;display:flex;flex-direction:column;gap:.875rem}
  .shipping-item{display:flex;align-items:center;gap:.75rem;font-size:.875rem}
  .shipping-icon{width:36px;height:36px;background:var(--white);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .shipping-text strong{display:block;font-weight:600;font-size:.8125rem;color:var(--dark)}
  .shipping-text span{font-size:.75rem;color:var(--gray-600)}
  .trust-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
  @media(max-width:600px){.trust-grid{grid-template-columns:repeat(2,1fr)}}
  .trust-badge{background:var(--white);border:1px solid var(--gray-200);border-radius:14px;padding:1rem .75rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;text-align:center}
  .trust-badge__icon{font-size:1.375rem}
  .trust-badge__label{font-size:.7rem;font-weight:600;color:var(--dark);line-height:1.3}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
  .lightbox.open{opacity:1;pointer-events:all}
  .lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:8px}
  .lightbox-close{position:absolute;top:1.5rem;right:1.5rem;width:44px;height:44px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#fff;font-size:1.25rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .toasts{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:9100;display:flex;flex-direction:column;gap:.5rem;pointer-events:none}
  .toast{background:var(--green-900);color:#fff;padding:.75rem 1.5rem;border-radius:100px;font-size:.875rem;display:flex;align-items:center;gap:.5rem;box-shadow:0 4px 24px rgba(0,0,0,.2);animation:toastIn .3s}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
  .cart-overlay.open{opacity:1;pointer-events:all}
  .cart-drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:#fff;z-index:201;transform:translateX(100%);transition:transform .45s var(--ease);display:flex;flex-direction:column}
  .cart-drawer.open{transform:none}
  .cart-head{display:flex;justify-content:space-between;align-items:center;padding:1.5rem;border-bottom:1px solid var(--gray-200)}
  .cart-body{flex:1;overflow-y:auto;padding:1.5rem}
  .cart-empty{text-align:center;padding:3rem 1rem;color:var(--gray-600)}
  .cart-foot{padding:1.5rem;border-top:1px solid var(--gray-200)}
  .cart-total{display:flex;justify-content:space-between;margin-bottom:1rem;font-weight:600}
  .btn-icon{width:44px;height:44px;padding:0;border-radius:100px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.25rem;color:var(--dark)}
  .skel{background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:skel 1.4s ease-in-out infinite;border-radius:8px}
  @keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .footer-mini{background:var(--green-900);padding:2rem var(--gutter);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;font-size:.8rem;color:rgba(255,255,255,.4)}
  .footer-mini a{color:rgba(255,255,255,.4);transition:color .2s}.footer-mini a:hover{color:#fff}
  .wa-fab{position:fixed;bottom:2rem;right:2rem;width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:90;box-shadow:0 4px 24px rgba(37,211,102,.4);transition:transform .3s}
  .wa-fab:hover{transform:scale(1.1)}
  </style>

<script>
const SHOP='a8ck6a-t6.myshopify.com';
const TOKEN='db3d07fd2f93e53129fa1462ece7958a';
const handle=new URLSearchParams(location.search).get('handle');
let cartItems=[];

// Cart
const co=document.getElementById('cartOverlay');
const cd=document.getElementById('cartDrawer');
const openCart=()=>{co.classList.add('open');cd.classList.add('open');document.body.style.overflow='hidden'};
const closeCart=()=>{co.classList.remove('open');cd.classList.remove('open');document.body.style.overflow=''};
co.addEventListener('click',closeCart);
document.querySelectorAll('[data-cart-close]').forEach(b=>b.addEventListener('click',closeCart));
document.querySelectorAll('[data-cart]').forEach(b=>b.addEventListener('click',openCart));

// Toast
function showToast(msg){
  const c=document.querySelector('.toasts');
  const t=document.createElement('div');t.className='toast';
  t.innerHTML='<span>✓</span><span>'+msg+'</span>';
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .35s';setTimeout(()=>t.remove(),400)},3200);
}

// Lightbox
const lb=document.getElementById('lightbox');
const lbImg=document.getElementById('lightboxImg');
document.getElementById('lightboxClose').addEventListener('click',()=>lb.classList.remove('open'));
lb.addEventListener('click',e=>{if(e.target===lb)lb.classList.remove('open')});
window.addEventListener('keydown',e=>{if(e.key==='Escape')lb.classList.remove('open')});

// Stars
function starHTML(rating){
  let h='';
  for(let i=1;i<=5;i++){
    if(i<=Math.floor(rating))h+='<span class="star">★</span>';
    else if(i===Math.ceil(rating)&&rating%1>=.5)h+='<span class="star" style="opacity:.55">★</span>';
    else h+='<span class="star-empty">★</span>';
  }return h;
}

if(!handle){
  document.getElementById('pinfo').innerHTML='<p style="color:var(--gray-600)">No se especificó un producto. <a href="tienda.html" style="color:var(--green-600);font-weight:600">Volver a la tienda →</a></p>';
  document.getElementById('gallery').innerHTML='';
  document.getElementById('breadcrumbName').textContent='Producto no encontrado';
}else{
  (async()=>{
    const query=`{
      product(handle:"${handle}"){
        id title vendor description
        priceRange{minVariantPrice{amount currencyCode}}
        compareAtPriceRange{minVariantPrice{amount}}
        images(first:8){edges{node{url altText}}}
        variants(first:10){edges{node{id title availableForSale quantityAvailable priceV2{amount} compareAtPriceV2{amount}}}}
      }
    }`;
    try{
      const res=await fetch(`https://${SHOP}/api/2024-01/graphql.json`,{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Shopify-Storefront-Access-Token':TOKEN},
        body:JSON.stringify({query})
      });
      const {data}=await res.json();
      const p=data?.product;
      if(!p){
        document.getElementById('pinfo').innerHTML='<p style="color:var(--gray-600)">Producto no encontrado. <a href="tienda.html" style="color:var(--green-600);font-weight:600">Volver a la tienda →</a></p>';
        document.getElementById('gallery').innerHTML='';
        document.getElementById('breadcrumbName').textContent='No encontrado';
        return;
      }
      renderProduct(p);
    }catch(err){
      console.error(err);
      document.getElementById('pinfo').innerHTML='<p style="color:var(--gray-600)">Error al cargar el producto. <a href="tienda.html" style="color:var(--green-600);font-weight:600">Volver a la tienda →</a></p>';
    }
  })();
}

function renderProduct(p){
  document.title=p.title+' — Farmacia Los Robles';
  document.getElementById('breadcrumbName').textContent=p.title;

  const images=p.images.edges.map(e=>e.node);
  const variants=p.variants.edges.map(e=>e.node);
  const v=variants[0];
  const price=parseFloat(v?.priceV2?.amount||p.priceRange.minVariantPrice.amount);
  const wasRaw=parseFloat(v?.compareAtPriceV2?.amount||p.compareAtPriceRange?.minVariantPrice?.amount||0);
  const was=wasRaw>price?wasRaw:0;
  const discount=was?Math.round((1-price/was)*100):0;
  const available=v?.availableForSale!==false;
  const qtyAvail=v?.quantityAvailable??null;
  const stars=4.5;
  const reviews=42;

  let stockClass='in',stockLabel='En stock';
  if(!available){stockClass='out';stockLabel='Agotado';}
  else if(qtyAvail!==null&&qtyAvail<=5){stockClass='low';stockLabel='Pocas unidades ('+qtyAvail+')';}

  // Gallery state
  let activeImg=0;

  function mountGallery(){
    const img=images[activeImg]||{url:'',altText:p.title};
    const thumbsHTML=images.length>1
      ?'<div class="gallery__thumbs">'+images.map((im,i)=>`<div class="gallery__thumb${i===activeImg?' active':''}" data-idx="${i}"><img src="${im.url}" alt="${im.altText||p.title}"/></div>`).join('')+'</div>'
      :'';
    document.getElementById('gallery').innerHTML=`
      <div class="gallery__main" id="galleryMain">
        ${was?`<span class="gallery__badge gallery__badge--sale">−${discount}%</span>`:''}
        <img id="mainImg" src="${img.url}" alt="${img.altText||p.title}"/>
        <button class="gallery__zoom-btn" id="zoomBtn" title="Ver en alta resolución">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
        </button>
      </div>
      ${thumbsHTML}`;
    document.querySelectorAll('.gallery__thumb').forEach(el=>{
      el.addEventListener('click',()=>{activeImg=+el.dataset.idx;mountGallery();});
    });
    document.getElementById('zoomBtn')?.addEventListener('click',openLightbox);
    document.getElementById('galleryMain')?.addEventListener('dblclick',openLightbox);
  }
  function openLightbox(){lbImg.src=images[activeImg]?.url||'';lb.classList.add('open');}
  mountGallery();

  // Info
  let qty=1;
  function mountInfo(){
    document.getElementById('pinfo').innerHTML=`
      <div class="pinfo__brand">${p.vendor}</div>
      <h1 class="pinfo__title">${p.title}</h1>
      <div class="pinfo__stars">
        <div class="stars">${starHTML(stars)}</div>
        <span class="pinfo__reviews-count">${stars.toFixed(1)} · ${reviews} opiniones</span>
      </div>
      <div class="pinfo__divider"></div>
      <div class="pinfo__price">
        <span class="price-now">${price.toFixed(2).replace('.',',')} €</span>
        ${was?`<span class="price-was">${was.toFixed(2).replace('.',',')} €</span><span class="price-discount">−${discount}%</span>`:''}
      </div>
      <div class="pinfo__stock">
        <span class="stock-dot stock-dot--${stockClass}"></span>
        <span class="stock-label--${stockClass}">${stockLabel}</span>
      </div>
      <div class="qty-row">
        <span class="qty-label">Cantidad</span>
        <div class="qty-ctrl">
          <button class="qty-btn" id="qtyMinus">−</button>
          <span class="qty-val" id="qtyVal">${qty}</span>
          <button class="qty-btn" id="qtyPlus">+</button>
        </div>
      </div>
      <div class="pinfo__actions">
        <div class="actions-row">
          <button class="btn btn-primary" id="addCartBtn"${!available?' disabled':''}>
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            ${available?'Añadir al carrito':'Agotado'}
          </button>
          <button class="btn btn-wish" id="wishBtn" title="Guardar en favoritos">♡</button>
        </div>
        <button class="btn btn-secondary" id="buyNowBtn"${!available?' disabled':''}>Comprar ahora →</button>
      </div>
      <div class="shipping-box">
        <div class="shipping-item">
          <div class="shipping-icon">🚚</div>
          <div class="shipping-text"><strong>Entrega estimada 24–48h</strong><span>Pedidos antes de las 14h en días laborables</span></div>
        </div>
        <div class="shipping-item">
          <div class="shipping-icon">🎁</div>
          <div class="shipping-text"><strong>Envío gratuito desde 29 €</strong><span>España peninsular · Islas consultar</span></div>
        </div>
        <div class="shipping-item">
          <div class="shipping-icon">↩️</div>
          <div class="shipping-text"><strong>Devolución sin coste 30 días</strong><span>Garantía de satisfacción total</span></div>
        </div>
      </div>
      <div class="trust-grid">
        <div class="trust-badge"><div class="trust-badge__icon">✅</div><div class="trust-badge__label">Producto original</div></div>
        <div class="trust-badge"><div class="trust-badge__icon">🏥</div><div class="trust-badge__label">Farmacia autorizada</div></div>
        <div class="trust-badge"><div class="trust-badge__icon">🔒</div><div class="trust-badge__label">Pago seguro</div></div>
        <div class="trust-badge"><div class="trust-badge__icon">⚡</div><div class="trust-badge__label">Entrega rápida</div></div>
      </div>
      ${p.description?`<div style="padding-top:1.25rem;border-top:1px solid var(--gray-200)"><h3 style="font-family:var(--f-display);font-size:1.125rem;font-weight:600;margin-bottom:.75rem">Descripción</h3><p style="font-size:.9rem;line-height:1.8;color:var(--gray-600)">${p.description}</p></div>`:''}
    `;

    document.getElementById('qtyMinus').addEventListener('click',()=>{if(qty>1){qty--;document.getElementById('qtyVal').textContent=qty;}});
    document.getElementById('qtyPlus').addEventListener('click',()=>{qty++;document.getElementById('qtyVal').textContent=qty;});

    document.getElementById('addCartBtn')?.addEventListener('click',()=>{
      const existing = cartItems.findIndex(i=>i.id===v?.id);
      if(existing>=0) cartItems[existing].qty+=qty;
      else cartItems.push({id:v?.id,title:p.title,price,qty,img:images[0]?.url||''});
      sessionStorage.setItem('farmCart', JSON.stringify(cartItems));
      updateCartDrawer();
      showToast('¡Añadido al carrito!');
      openCart();
    });

    document.getElementById('buyNowBtn')?.addEventListener('click',()=>{
      const existing = cartItems.findIndex(i=>i.id===v?.id);
      if(existing>=0) cartItems[existing].qty+=1;
      else cartItems.push({id:v?.id,title:p.title,price,qty:1,img:images[0]?.url||''});
      sessionStorage.setItem('farmCart', JSON.stringify(cartItems));
      updateCartDrawer();
      window.location.href='checkout.html';
    });

    document.getElementById('wishBtn')?.addEventListener('click',function(){
      this.classList.toggle('active');
      this.textContent=this.classList.contains('active')?'♥':'♡';
      showToast(this.classList.contains('active')?'Guardado en favoritos':'Eliminado de favoritos');
    });
  }
  mountInfo();
}

function updateCartDrawer(){
  const body=document.getElementById('cartBody');
  const total=document.getElementById('cartTotal');
  if(!cartItems.length){
    body.innerHTML='<div class="cart-empty"><div style="font-size:3rem;margin-bottom:1rem">🛒</div><p style="font-weight:600">Tu carrito está vacío</p></div>';
    total.textContent='0,00 €';
    return;
  }
  const sum=cartItems.reduce((a,i)=>a+i.price*i.qty,0);
  body.innerHTML=cartItems.map((item,i)=>`
    <div style="display:flex;gap:1rem;align-items:center;padding:.875rem 0;border-bottom:1px solid var(--gray-200)">
      ${item.img?`<img src="${item.img}" style="width:60px;height:60px;object-fit:contain;border-radius:8px;background:var(--gray-100);padding:.25rem;flex-shrink:0"/>`:'<div style="width:60px;height:60px;background:var(--gray-100);border-radius:8px;flex-shrink:0"></div>'}
      <div style="flex:1;min-width:0">
        <div style="font-size:.8125rem;font-weight:600;line-height:1.35;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${item.title}</div>
        <div style="font-size:.8rem;color:var(--gray-600)">${item.qty} × ${item.price.toFixed(2).replace('.',',')} €</div>
      </div>
      <button onclick="removeCartItem(${i})" style="background:none;border:none;cursor:pointer;color:var(--gray-600);font-size:1rem;padding:.25rem;flex-shrink:0">✕</button>
    </div>`).join('');
  total.textContent=sum.toFixed(2).replace('.',',')+' €';
}
window.removeCartItem=i=>{cartItems.splice(i,1);updateCartDrawer();};
</script>
